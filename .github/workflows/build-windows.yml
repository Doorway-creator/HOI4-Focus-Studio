name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt pyinstaller
      - name: Run export, install, and privacy tests
        run: python -m unittest discover -s tests -v
      - name: Build standalone folder
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onedir --name "HOI4 Focus Studio" `
            --add-data "index.html;." `
            --add-data "app.js;." `
            --add-data "focus_tree_interactions.js;." `
            --add-data "style.css;." `
            --add-data "data;data" `
            --add-data "icon-previews;icon-previews" `
            --add-data "base_mod;base_mod" `
            --add-data "projects/default_project.json;projects" `
            --add-data "apply_update.ps1;." `
            server.py
      - name: Privacy scan build output
        shell: pwsh
        run: |
          $patterns = 'gmail\.com|api[_-]?key|bearer|authorization|C:\\Users\\'
          $hits = Get-ChildItem -Recurse dist -File | Where-Object { $_.Extension -match '\.(txt|json|js|html|css|py|ps1|mod|yml|yaml|ini|cfg)$' } | Select-String -Pattern $patterns -CaseSensitive:$false
          if ($hits) { $hits | Format-Table; throw 'Privacy scan failed.' }
      - name: Package release ZIP and checksum
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/HOI4 Focus Studio" -DestinationPath "HOI4-Focus-Studio-Windows.zip"
          $hash = (Get-FileHash "HOI4-Focus-Studio-Windows.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  HOI4-Focus-Studio-Windows.zip" | Set-Content -Encoding ascii "HOI4-Focus-Studio-Windows.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: HOI4-Focus-Studio-Windows
          path: |
            HOI4-Focus-Studio-Windows.zip
            HOI4-Focus-Studio-Windows.zip.sha256
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            gh release create "${{ github.ref_name }}" `
              "HOI4-Focus-Studio-Windows.zip" `
              "HOI4-Focus-Studio-Windows.zip.sha256" `
              --title "HOI4 Focus Studio ${{ github.ref_name }}" `
              --notes-file "RELEASE_NOTES.md"
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq 3) { exit $LASTEXITCODE }
            Start-Sleep -Seconds 15
          }
